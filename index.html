<!-- FIREBASE SDK SETUP -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCVKCuHVeMQL9foYqwzjaQs2qeNGmLMWCg",
    authDomain: "forest-frenzy-dd412.firebaseapp.com",
    projectId: "forest-frenzy-dd412",
    storageBucket: "forest-frenzy-dd412.firebasestorage.app",
    messagingSenderId: "615347081848",
    appId: "1:615347081848:web:b4157fab960be649c1538d"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // Expose these globally so your main game code can use them
  window.db = db;
  window.playerId = null;

  // 1. SILENT LOGIN
  signInAnonymously(auth).then((userCredential) => {
    window.playerId = userCredential.user.uid;
    console.log("Player ID connected:", window.playerId);
    loadGameFromCloud(); // Try to load their save file
  }).catch((error) => {
    console.error("Could not log in:", error);
  });

  // 2. LOAD GAME FUNCTION
  window.loadGameFromCloud = async function() {
    if (!window.playerId) return;
    
    // Look for a document matching the player's unique ID inside the "players" folder
    const playerRef = doc(db, "players", window.playerId);
    const docSnap = await getDoc(playerRef);

    if (docSnap.exists()) {
      const cloudData = docSnap.data();
      console.log("Cloud save loaded successfully:", cloudData);
      
      // TODO: Apply this data to your game's UI and internal variables
      // Example: S.gems = cloudData.gems;
      
    } else {
      console.log("New player! No cloud save exists yet.");
    }
  };

  // 3. SAVE GAME FUNCTION
  window.saveGameToCloud = async function(gameDataObj) {
    if (!window.playerId) {
      console.log("Player not logged in yet. Cannot save.");
      return;
    }
    
    const playerRef = doc(db, "players", window.playerId);
    
    // Write the data to the database. { merge: true } ensures we don't overwrite
    // fields we didn't explicitly pass in.
    await setDoc(playerRef, gameDataObj, { merge: true });
    console.log("Game saved to the cloud!");
  };
</script>

@keyframes combatflash{0%,100%{background:linear-gradient(180deg,#5a1512dd,#2a0806dd);box-shadow:0 0 6px #ff4a3a}
 50%{background:linear-gradient(180deg,#a01c14dd,#5a0e08dd);box-shadow:0 0 18px #ff4a3a}}
#storeBg{position:absolute;top:0;left:0;width:100%;z-index:0;display:block}
.sthdr{position:relative;width:94%;margin:14px auto 8px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;
 font-size:19px;font-weight:900;color:#fff;text-shadow:0 2px 2px rgba(0,0,0,.5);border:2px solid rgba(0,0,0,.35);
 box-shadow:inset 0 2px 4px rgba(255,255,255,.3),0 4px 0 rgba(0,0,0,.35);overflow:hidden}
.sthdr img{width:26px;height:26px;margin-right:8px;filter:drop-shadow(0 1px 2px #0007)}
.sthdr .hgleam{position:absolute;top:-40%;left:-70%;width:34%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);transform:rotate(20deg);animation:shine 3s ease-in-out infinite}
.sthdr.h-special{background:linear-gradient(180deg,#6bc46f,#2f7a37)}
.sthdr.h-gems{background:linear-gradient(180deg,#8a6ee0,#4a2f9a);clip-path:polygon(3% 0,97% 0,100% 50%,97% 100%,3% 100%,0 50%)}
.sthdr.h-coins{background:linear-gradient(180deg,#f5cd54,#c07e18);color:#5a3d08;text-shadow:0 1px 0 rgba(255,255,255,.4);border-radius:24px}
.sthdr.h-purchased{background:linear-gradient(180deg,#c85a50,#7a231c);border-style:dashed}
.tsp.pink{background:radial-gradient(#ffd0ee,rgba(232,80,180,0) 70%)}
.tsp.gold{background:radial-gradient(#ffe89a,rgba(230,170,40,0) 70%)}
.embers{position:absolute;top:-9px;left:0;right:0;height:16px;pointer-events:none;overflow:visible;z-index:4}
.embers i{position:absolute;bottom:0;width:5px;height:5px;border-radius:50%;background:radial-gradient(#fff2b0,#f0902c 60%,rgba(224,90,30,0));animation:emb 1.5s ease-out infinite}
@keyframes emb{0%{transform:translateY(4px) scale(.5);opacity:0}25%{opacity:1}100%{transform:translateY(-16px) scale(1);opacity:0}}
.stcard .buy{position:relative;overflow:visible}
.tile.leg-glow{position:relative;overflow:visible}
.panel.fullpanel{width:100%;max-width:100%;height:100%;max-height:100%;border-radius:0;border:none;
 overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#39412e,#181d12)}
.pullfs{width:100%;max-width:560px;text-align:center;padding:12px}
.pullfs .drawgrid{gap:10px}
.sthdr{margin:22px auto 12px}
.stgrid{margin:0 auto 20px}
.sthdr.h-coins img{display:none}
.buynow{position:absolute;left:50%;bottom:-3px;transform:translateX(-50%);background:linear-gradient(180deg,#f26a5e,#a8291f);color:#fff;font-weight:bold;font-size:10px;line-height:1;padding:3px 8px;border-radius:9px;border:1px solid #ffb0a8;box-shadow:0 2px 4px rgba(0,0,0,.55);white-space:nowrap;z-index:5;cursor:pointer;letter-spacing:.2px}
.tile.lock{overflow:visible}
.msmile{font-size:23px}
.msmile .mtxt{top:49px}
.chestbox{width:86px}
.chestbox img{width:76px;height:66px}
.stcard .buy::after{display:none}
#boot{position:fixed;inset:0;z-index:9999;background:#0d120b;overflow:hidden;display:flex;align-items:center;justify-content:flex-end;flex-direction:column;padding-bottom:11%;transition:opacity .6s ease}
#boot.done{opacity:0;pointer-events:none}
#boot .boot-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
#boot .boot-scrim{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(13,18,11,.15) 0%,rgba(13,18,11,.35) 45%,rgba(13,18,11,.82) 78%,#0d120b 100%)}
#bootCredits{position:relative;z-index:2;text-align:center}
#bootCredits .credit-sub{color:#cfe0c2;font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;text-shadow:0 2px 6px #000}
#bootCredits .credit-name{color:#fff;font-size:30px;font-weight:900;letter-spacing:1px;animation:creditFlash .5s steps(1) infinite;text-shadow:0 2px 14px rgba(0,0,0,.9),0 0 20px rgba(120,220,120,.35)}
@keyframes creditFlash{0%,58%{opacity:1}59%,100%{opacity:.12}}
#bootLoad{position:relative;z-index:2;display:none;flex-direction:column;align-items:center;width:80%;max-width:340px}
#bootLoad .boot-title{color:#8fe06a;font-size:30px;font-weight:900;letter-spacing:2px;margin-bottom:20px;text-shadow:0 2px 10px #000,0 0 18px rgba(60,140,40,.5)}
#bootLoad .loadbar{width:100%;height:16px;background:#0b0f09;border:2px solid #000;border-radius:10px;overflow:hidden;box-shadow:inset 0 2px 3px #000a}
#bootLoad #loadFill{height:100%;width:0%;background:linear-gradient(180deg,#8fe06a,#3f8f2f);border-radius:8px;transition:width .12s linear}
#bootLoad #loadPct{color:#eaf2e2;font-size:13px;font-weight:700;margin-top:10px;text-shadow:0 1px 3px #000}
#bootLoad .boot-tip{color:#b9c6ac;font-size:12px;margin-top:6px;text-shadow:0 1px 3px #000}
.bypass-sec .stimg img{filter:drop-shadow(0 3px 3px rgba(0,0,0,.35))}
.panel.bigpop{background:linear-gradient(165deg,#414c36 0%,#2b3221 55%,#1c2116 100%);border:3px solid #c8a24a;box-shadow:inset 0 0 0 2px #4a3a18,inset 0 20px 46px rgba(0,0,0,.32),0 14px 44px rgba(0,0,0,.6);position:relative}
.panel.bigpop::before{content:'';position:absolute;left:0;right:0;top:0;height:130px;pointer-events:none;background:radial-gradient(120% 100% at 50% 0,rgba(255,214,120,.16),transparent 70%);border-radius:15px 15px 0 0}
.panel.bigpop h2{position:relative;padding-bottom:11px}
.panel.bigpop h2::after{content:'';position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:130px;height:3px;border-radius:2px;background:linear-gradient(90deg,transparent,#e8c674,transparent)}
.panel.bigpop h3.sec{color:#f2d68a;border-left:3px solid #c8a24a;padding-left:8px}
</style>
